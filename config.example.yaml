# provider: 二选一(openai 或 anthropic)
#
# OpenAI 兼容(provider.type: openai):
#   支持 OpenAI / DeepSeek / 智谱 等兼容端点。
#   base_url 留 null 走 OpenAI 官方;DeepSeek 等填对应的 /v1 根地址。
#
# Anthropic(provider.type: anthropic):
#   使用 Claude 系列模型;api_key 填 ${ANTHROPIC_API_KEY},base_url 忽略。
provider:
  type: openai
  api_key: ${OPENAI_API_KEY}
  base_url: null

model: "glm-5.2"

pricing:
  glm-5.2:
    input_per_mtok: 0.5
    output_per_mtok: 2.0
    cache_read_per_mtok: 0.25
    cache_write_per_mtok: 0.5

budget:
  limit: 5.0
  exceeded_action: stop

workflow:
  max_steps: 50
  max_fix_retries: 3

shell:
  allowed_commands: ["verilator", "yosys", "openroad", "magic", "netgen", "klayout"]
  denied_args: ["rm", "chmod", "sudo", ">", "|", "&", "`", "$"]

docker:
  image: "hpretl/iic-osic-tools:latest"
  container: "eda-tools"
  workdir: "/work/designs"
  pdk: "sky130A"
