# Design 配置:声明模块名、testbench、RTL 模块拆分。
# executor 和 workflow 从此文件读取,避免硬编码。

top_module: uart          # 顶层模块名(synth -top / link_design / <top>.gds)
tb_module: tb_uart        # testbench 模块名(verilator --top-module)

# RTL 模块拆分:每个模块一个 LLM step,按顺序设计。
# workflow 根据此列表动态生成 rtl_<id> step + edges。
modules:
  - id: tx
    name: UART 发送器
    file: uart_tx.v
    module_name: uart_tx
    prompt_hint: "设计 uart_tx 发送器模块。波特率 115200(50MHz/434),8bit 数据 LSB first,START+DATA+STOP。输入 clk/rst_n/tx_start/tx_data[7:0],输出 tx_busy/txd。"
  - id: rx
    name: UART 接收器
    file: uart_rx.v
    module_name: uart_rx
    prompt_hint: "设计 uart_rx 接收器模块。波特率 115200,8bit LSB first,检测 START 下降沿,采样 DATA 中点,STOP 校验。输入 clk/rst_n/rxd,输出 rx_busy/rx_data[7:0]/rx_valid。"
  - id: top
    name: 顶层模块
    file: uart.v
    module_name: uart
    prompt_hint: "设计顶层 uart 模块。例化 uart_tx 和 uart_rx,对外暴露 clk/rst_n/tx_start/tx_data/tx_busy/txd/rxd/rx_busy/rx_data/rx_valid。"
